name: "CLA Assistant"
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened,closed,synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event.pull_request
        uses: cla-assistant/github-action@v2.5.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_SIGNATURE_PAT }}
        with:
          path-to-signatures: 'pcb-retrace-signatures.json'
          path-to-cla: 'https://github.com/dev-lab/pcb-retrace/blob/main/CLA.md'
          remote-organization-name: 'dev-lab'
          remote-repository-name: 'dev-lab-cla-signatures'
          branch: 'main'
          allowlist: 'bot*,'
